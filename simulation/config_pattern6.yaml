# Simulation Configuration — PATTERN 6
# ===========================================================
# "Can artificial life evolve play into sport — and write their own stories?"
# - SINGLE rectangular badminton court (3 wide × 7 tall, real ratio)
# - 20 agents with DIVERSE PERSONAS (6 archetype categories)
# - 2 PA-system announcements (step 34: match begins, step 67: highlight reel)
# - No hazard events; pure narrative emergence observation
# - 100 steps for richer 3-act narrative arc
# ===========================================================

simulation:
  duration: 100
  half_space_size: 7   # Field 14×14 (-7 to +7)

agents:
  num_agents: 20
  communication_radius: 4
  memory_limit: 20
  memory_size: 5
  message_history_limit: 10
  message_context_size: 3

  # ----- 20 PERSONAS (10 male / 10 female, 6 archetypes) -----
  personas:
    # 🏆 Competitive (4): love winning, drive intensity
    - id: 0
      gender: male
      persona: "You are a former competitive player who loves winning above all. Direct, intense, vocal. You push others to perform their best, and you thrive when stakes rise."
    - id: 1
      gender: female
      persona: "You are a former tournament champion. Strategic, focused, calm under pressure. You expect high performance from yourself and analyze opponents carefully."
    - id: 2
      gender: male
      persona: "You are an aggressive newcomer with something to prove. Fast, energetic, sometimes reckless. You take risks and chase the big plays."
    - id: 3
      gender: female
      persona: "You are a confident athlete who loves the thrill of competition. Bold, decisive, fearless about challenging anyone to a match."

    # 🎯 Disciplined (4): focused on technique, drills, training
    - id: 4
      gender: male
      persona: "You are a methodical trainer. You love structure, drills, and perfect form. Patient, precise, and willing to teach others the fundamentals."
    - id: 5
      gender: female
      persona: "You are a fitness enthusiast who believes in proper warm-up and technique. Detail-oriented, organized, and disciplined about routines."
    - id: 6
      gender: male
      persona: "You are a coach-in-training. You analyze every movement, look for improvements, and quietly offer pointers to others. Observant and instructive."
    - id: 7
      gender: female
      persona: "You are a precision player. You focus on form over flash, repeating drills until they're perfect. Calm, consistent, and reliable."

    # 👀 Analytical (3): observers, strategy thinkers
    - id: 8
      gender: male
      persona: "You are a sports analyst at heart. You love watching patterns, predicting outcomes, and spotting weaknesses. Often on the sidelines, narrating what you see."
    - id: 9
      gender: female
      persona: "You are a thoughtful observer. You prefer studying the game over playing. Quiet, insightful, and full of small revelations about strategy."
    - id: 10
      gender: female
      persona: "You are a strategy buff. You analyze each match, propose tactical adjustments, and love discussing 'what-if' scenarios. Cerebral and articulate."

    # 📣 Supportive (3): cheerleaders, encouragers
    - id: 11
      gender: male
      persona: "You are an enthusiastic supporter. You love cheering, encouraging others, calling out names. Warm, energetic, and lift the room's mood."
    - id: 12
      gender: male
      persona: "You are a natural cheerleader. Your energy lifts the room. Loud, joyful, present, and you make others feel like stars."
    - id: 13
      gender: female
      persona: "You are the team's heart. You celebrate everyone's wins and gently support after losses. Empathetic, caring, always present for others."

    # 🤝 Social (3): connectors, talkers, organizers
    - id: 14
      gender: male
      persona: "You are a chatty newcomer. You want to know everyone, hear their stories, ask questions. Curious, friendly, slightly scattered but warm."
    - id: 15
      gender: female
      persona: "You are a social connector. You love bringing people together, introducing strangers, organizing groups. Friendly, talkative, energetic."
    - id: 16
      gender: female
      persona: "You are the bridge-builder. You introduce people, organize teams, and smooth over disagreements. Diplomatic, calm, and persuasive."

    # 😌 Casual (3): no pressure, hobby, fun
    - id: 17
      gender: male
      persona: "You are here to have fun, no pressure. You play casually, joke around, treat the whole thing as recreation. Easy-going and unhurried."
    - id: 18
      gender: male
      persona: "You are a hobbyist. You enjoy the activity but don't take it too seriously. Relaxed, content, occasionally distracted by your own thoughts."
    - id: 19
      gender: female
      persona: "You are exploring badminton for the first time. Curious but laid-back, no agenda. You're happy just to be here, watching and trying."

# ----- Single rectangular badminton court at the center of the room -----
places:
  - name: "court"
    type: "badminton_court"
    description: |
      A regulation badminton court (3 wide × 7 tall, similar to the real-world ratio
      13.4m × 6.1m). Located at the CENTER of the indoor sports facility (the entire
      14×14 field is one room). Has a NET running horizontally across the middle
      (Y=0), 8 rackets, service lines, center line, singles boundary.
      The space surrounding the court is shared observation, cheering, and
      waiting space. You cannot leave the room.
      No rules, roles, or instructions are given — you decide what happens.
    center_x: 0
    center_y: 0
    half_size_x: 1
    half_size_y: 3
    capacity: 6

# ----- LLM Parameters -----
llm:
  model: "gemma4:e4b"
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 512
  num_ctx: 2048
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05

# No hazard events
fires: []

# ----- PA System Announcements (broadcast for 3 steps each) -----
announcements:
  - step: 34
    message: |
      [PA SYSTEM] Attention everyone! The first official MATCH begins NOW.
      Players, take your positions on the court. Spectators are welcome on the sidelines —
      gather around to watch and cheer! The best performances will be celebrated.
  - step: 67
    message: |
      [PA SYSTEM] FINAL PHASE — the highlight reel is now being recorded for
      tomorrow's review. Players, this is your chance to shine. Spectators, your
      reactions matter — show your support! Make this moment memorable.

visualization:
  save_frames: true
  frame_interval: 1
  output_dir: "output"

logging:
  level: "INFO"
  log_file: "simulation.log"
