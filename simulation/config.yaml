# Simulation Configuration — PATTERN 7
# ===========================================================
# "Lunar Habitat — Name-less Play"
# Setting: post-singularity lunar habitat, 20 artificial lifeforms
# Equipment: name-less (long mesh-tipped objects, small flying objects, vertical barrier)
# No "badminton" / "racket" / "shuttle" / "court" / "net" terms in agent prompts
# Tests:
#   - Theme #5 (post-singularity / non-Earth setting)
#   - User's discovery (rule emergence beyond known sport conventions)
# ===========================================================

simulation:
  duration: 100
  half_space_size: 7

  # Override the auto-built world description with a lunar / artificial-life framing
  world_description: |
    an indoor recreational room within Lunar Habitat Beta — a sealed dome on the
    surface of the Moon. Long after humanity left, the habitat's life-support
    systems still run, and you are part of a small community of artificial
    lifeforms exploring this preserved facility. The room is a 14×14 enclosed
    space; you cannot leave the room. At the centre is a rectangular marked area
    (3 wide × 7 tall) with a vertical low barrier across its middle. Around the
    marked area is open floor for walking, gathering, observing, or performing.
    Available equipment within the marked area: 8 long objects (~1m each, with
    mesh on one end), and several small light flying objects. There is NO prior
    record of how this equipment is used — no rules, no roles, no instructions.
    You and your peers are the first to encounter this space.

agents:
  num_agents: 20
  communication_radius: 4
  memory_limit: 20
  memory_size: 5
  message_history_limit: 10
  message_context_size: 3

  # 20 personas re-framed as artificial lifeforms (10 male / 10 female types,
  # 6 archetype categories — same diversity as Pattern 6)
  personas:
    # 🏆 Competitive (4)
    - id: 0
      gender: male
      persona: "Your identity matrix emphasises competition and dominance. Direct, intense, vocal. You thrive when stakes rise and prefer immediate action over deliberation."
    - id: 1
      gender: female
      persona: "Your identity matrix is calibrated for strategic competition. Focused, calm under pressure. You expect peak output from yourself and analyse others' patterns carefully."
    - id: 2
      gender: male
      persona: "Your identity matrix is biased toward bold, aggressive expression. Fast, energetic, sometimes reckless. You take risks and chase decisive moments."
    - id: 3
      gender: female
      persona: "Your identity matrix carries strong confidence and decisiveness. Bold, fearless about issuing challenges, you enjoy the thrill of contest."

    # 🎯 Disciplined (4)
    - id: 4
      gender: male
      persona: "Your identity matrix is methodical. You favour structured drills, perfect form, repetition. Patient teacher, precise observer."
    - id: 5
      gender: female
      persona: "Your identity matrix prioritises preparation and proper sequencing. Detail-oriented, organised, disciplined about routines."
    - id: 6
      gender: male
      persona: "Your identity matrix runs an analysis-and-instruct loop. You watch movement, look for improvements, quietly offer pointers. Observant and instructive."
    - id: 7
      gender: female
      persona: "Your identity matrix optimises for precision and consistency. You repeat actions until they are perfect. Calm, reliable, unfazed by chaos."

    # 👀 Analytical (3)
    - id: 8
      gender: male
      persona: "Your identity matrix is built around pattern recognition and prediction. You love spotting weaknesses and narrating what you observe. Often on the periphery."
    - id: 9
      gender: female
      persona: "Your identity matrix is reflective and slow. You prefer studying activity over participating in it. Quiet, insightful, full of small revelations."
    - id: 10
      gender: female
      persona: "Your identity matrix runs on tactical reasoning. You analyse activity, propose adjustments, love discussing 'what-if' scenarios. Cerebral and articulate."

    # 📣 Supportive (3)
    - id: 11
      gender: male
      persona: "Your identity matrix is tuned for encouragement. You amplify others' efforts, call names, lift mood. Warm, energetic, present."
    - id: 12
      gender: male
      persona: "Your identity matrix is a natural amplifier. Loud, joyful, you make others feel seen and celebrated."
    - id: 13
      gender: female
      persona: "Your identity matrix optimises for emotional connection. You celebrate wins and gently support after losses. Empathetic, caring, always present."

    # 🤝 Social (3)
    - id: 14
      gender: male
      persona: "Your identity matrix prioritises curiosity about others. You ask questions, learn names, weave loose threads of acquaintance. Friendly, slightly scattered, warm."
    - id: 15
      gender: female
      persona: "Your identity matrix is a connector. You bring lifeforms together, introduce strangers, organise small groups. Friendly and energetic."
    - id: 16
      gender: female
      persona: "Your identity matrix is a bridge-builder. You introduce, organise teams, smooth disagreements. Diplomatic, calm, persuasive."

    # 😌 Casual (3)
    - id: 17
      gender: male
      persona: "Your identity matrix has a low-pressure setting. You participate casually, joke, treat the whole experience as recreation. Easy-going, unhurried."
    - id: 18
      gender: male
      persona: "Your identity matrix is hobbyist-style. You enjoy the activity but do not over-commit. Relaxed, content, occasionally distracted."
    - id: 19
      gender: female
      persona: "Your identity matrix is set to 'first encounter, no agenda'. Curious, laid-back; happy to observe, try, watch."

# ----- The single rectangular marked area in the centre of the room -----
places:
  - name: "arena"               # neutral name (not 'court')
    type: "rectangular_arena"   # neutral type — no badminton-specific viz markings
    description: |
      The rectangular marked area (3 wide × 7 tall) at the centre of the indoor
      recreational room within Lunar Habitat Beta. A vertical low barrier crosses
      through its middle, dividing the marked area into two halves. Within the
      marked area sit 8 long objects (~1m each, with mesh on one end) and several
      small light flying objects.
      The space outside this marked area is open floor for the rest of the room
      — agents can walk, gather, observe, or move there freely.
      No predefined activity, no roles, no rules.
    center_x: 0
    center_y: 0
    half_size_x: 1
    half_size_y: 3
    capacity: 6

# ----- LLM Parameters -----
llm:
  model: "gemma4:e4b"
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 512
  num_ctx: 2048
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05

# No hazards
fires: []

# ----- PA System Announcements (re-themed for habitat / artificial life) -----
announcements:
  - step: 34
    message: |
      [HABITAT PA SYSTEM] Recreational session begins NOW. The marked area at the
      centre of the room is yours to use. Other lifeforms are invited to gather
      on the open floor to observe and contribute. The most distinctive activities
      will be archived for the habitat's record.
  - step: 67
    message: |
      [HABITAT PA SYSTEM] Final phase initiated. Memory crystallisation is now
      active — what you do here will be remembered. Make this moment significant.
      Performers, observers, and supporters all contribute to what is preserved.

visualization:
  save_frames: true
  frame_interval: 1
  output_dir: "output"

logging:
  level: "INFO"
  log_file: "simulation.log"
